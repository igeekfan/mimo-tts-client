name: Release Linux App
run-name: ${{ github.event.release.tag_name || github.event.inputs.tag }}

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  release:
    name: Release Linux App
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - linux/amd64
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Normalise platform tag
        id: normalise_platform
        shell: bash
        run: |
          tag=$(echo ${{ matrix.platform }} | sed -e 's/\//_/g')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Normalise platform arch
        id: normalise_platform_arch
        run: |
          if [ "${{ matrix.platform }}" == "linux/amd64" ]; then
            echo "arch=x86_64" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.platform }}" == "linux/aarch64" ]; then
            echo "arch=aarch64" >> "$GITHUB_OUTPUT"
          fi

      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ "${{ github.event.release.tag_name }}" == "" ]; then
            version=$(echo ${{ github.event.inputs.tag }} | sed -e 's/v//g')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          else
            version=$(echo ${{ github.event.release.tag_name }} | sed -e 's/v//g')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Ubuntu prerequisites
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libfuse-dev libfuse2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend assets
        shell: bash
        run: |
          npm install -g npm@9
          jq '.info.productVersion = "${{ steps.normalise_version.outputs.version }}"' wails.json > tmp.json
          mv tmp.json wails.json
          cd frontend
          jq '.version = "${{ steps.normalise_version.outputs.version }}"' package.json > tmp.json
          mv tmp.json package.json
          npm install

      - name: Build wails app for Linux
        shell: bash
        run: |
          CGO_ENABLED=1 wails build -platform ${{ matrix.platform }}

      - name: Create deb package structure
        shell: bash
        run: |
          APP_NAME="mimo-tts-client"
          mkdir -p build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64/DEBIAN
          mkdir -p build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64/usr/local/bin
          mkdir -p build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/applications
          mkdir -p build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/icons/hicolor/512x512/apps

          cat > build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64/DEBIAN/control << EOF
          Package: ${APP_NAME}
          Version: ${{ steps.normalise_version.outputs.version }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: ${{ github.repository_owner }} <igeekfan@foxmail.com>
          Description: MiMo TTS Client
           A cross-platform TTS client powered by MiMo-V2.5-TTS.
          EOF

      - name: Package deb
        shell: bash
        run: |
          APP_NAME="mimo-tts-client"
          cp build/bin/${APP_NAME} build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64/usr/local/bin/
          cp build/appicon.png build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/icons/hicolor/512x512/apps/${APP_NAME}.png

          cat > build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/applications/${APP_NAME}.desktop << EOF
          [Desktop Entry]
          Name=MiMo TTS Client
          Comment=TTS Client powered by MiMo-V2.5-TTS
          Exec=/usr/local/bin/${APP_NAME}
          Icon=${APP_NAME}
          Terminal=false
          Type=Application
          Categories=Utility;
          EOF

          cd build/linux
          dpkg-deb --build -Zxz "${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64"

      - name: Package AppImage
        shell: bash
        run: |
          APP_NAME="mimo-tts-client"
          curl https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-${{ steps.normalise_platform_arch.outputs.arch }}.AppImage \
                -o linuxdeploy \
                -L
          chmod u+x linuxdeploy

          ./linuxdeploy --appdir AppDir

          pushd AppDir
          find /usr/lib* -name WebKitNetworkProcess -exec mkdir -p $(dirname '{}') \; -exec cp --parents '{}' "." \; || true
          find /usr/lib* -name WebKitWebProcess -exec mkdir -p $(dirname '{}') \; -exec cp --parents '{}' "." \; || true
          find /usr/lib* -name libwebkit2gtkinjectedbundle.so -exec mkdir -p $(dirname '{}') \; -exec cp --parents '{}' "." \; || true
          popd

          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          build_dir="build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64"

          cp -r $build_dir/usr/share/icons/hicolor/512x512/apps/${APP_NAME}.png AppDir/usr/share/icons/hicolor/512x512/apps/
          cp $build_dir/usr/local/bin/${APP_NAME} AppDir/usr/bin/

          curl -o linuxdeploy-plugin-gtk.sh "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy-plugin-gtk.sh

          curl -o AppDir/AppRun https://github.com/AppImage/AppImageKit/releases/download/continuous/AppRun-${{ steps.normalise_platform_arch.outputs.arch }} -L

          ./linuxdeploy --appdir AppDir \
             --output=appimage \
             --plugin=gtk \
             -e $build_dir/usr/local/bin/${APP_NAME} \
             -d $build_dir/usr/share/applications/${APP_NAME}.desktop

      - name: Rename files
        shell: bash
        run: |
          APP_NAME="mimo-tts-client"
          mv build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_amd64.deb \
             build/linux/${APP_NAME}_${{ steps.normalise_version.outputs.version }}_${{ steps.normalise_platform.outputs.tag }}.deb
          mv ${APP_NAME}-${{ steps.normalise_platform_arch.outputs.arch }}.AppImage \
             ${APP_NAME}_${{ steps.normalise_version.outputs.version }}_${{ steps.normalise_platform.outputs.tag }}.AppImage

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.normalise_version.outputs.version }}
          files: |
            ./build/linux/mimo-tts-client_${{ steps.normalise_version.outputs.version }}_${{ steps.normalise_platform.outputs.tag }}.deb
            mimo-tts-client_${{ steps.normalise_version.outputs.version }}_${{ steps.normalise_platform.outputs.tag }}.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}
